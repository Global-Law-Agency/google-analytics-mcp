services:
  - type: web
    name: google-analytics-mcp
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false  # Prompt to fill in during deploy
      - key: API_KEY
        generateValue: true  # Render auto-generates a random secret
      - key: PORT
        value: "8000"
